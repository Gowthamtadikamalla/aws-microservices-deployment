name: ci

# Runs on every push and pull request to validate the repo before merge.
# Non-destructive: no image push, no terraform apply.
#
# Purpose:
#   - Catch Python and Terraform issues early.
#   - Ensure Docker images build cleanly on the same architecture we deploy to.
#   - Keep the default branch always in a releasable state.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-lint-test:
    name: Python lint and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [service1, service2]
    defaults:
      run:
        working-directory: servers/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: servers/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests if present
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null; then
            pytest -q
          else
            echo "No tests directory found for ${{ matrix.service }}, skipping."
          fi

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: python-lint-test
    strategy:
      matrix:
        service: [service1, service2]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for linux/amd64
        uses: docker/build-push-action@v6
        with:
          context: servers/${{ matrix.service }}
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-validate:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  tf-security-scan:
    name: Terraform security scan (tfsec)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # tfsec catches common AWS misconfigurations (public S3, open SGs, missing
      # encryption, etc.). continue-on-error keeps the pipeline green while we
      # review and baseline findings; flip to false to enforce.
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
